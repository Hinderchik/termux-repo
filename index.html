<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XunKal1 · termux repo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c10;
      font-family: 'SF Mono', 'Fira Code', 'Monaco', monospace;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Шапка — минимальная */
    .header {
      background: #0e1115;
      border-bottom: 1px solid #1e2228;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo {
      color: #00ff9d;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: -0.5px;
    }
    .logo span {
      color: #3a4a5a;
      font-weight: 400;
    }
    .repo-line {
      font-size: 0.7rem;
      background: #1a1e24;
      padding: 5px 10px;
      border-radius: 8px;
      color: #6a7a8a;
    }
    .repo-line code {
      color: #00b8ff;
      background: none;
    }
    .github-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #eef4ff;
      text-decoration: none;
      font-size: 0.8rem;
      background: #1a1e24;
      padding: 5px 12px;
      border-radius: 20px;
      transition: 0.2s;
    }
    .github-link:hover {
      background: #2a2e36;
      color: #fff;
    }
    .github-icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Файловый менеджер — на всю высоту */
    .file-manager {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 20px 24px;
    }

    .path-bar {
      background: #0e1115;
      border: 1px solid #1e2228;
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 20px;
      font-size: 0.8rem;
      color: #6a7a8a;
      flex-shrink: 0;
    }
    .path-bar span {
      color: #00ff9d;
    }

    .files-list {
      background: #0e1115;
      border: 1px solid #1e2228;
      border-radius: 16px;
      overflow-y: auto;
      flex: 1;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid #1a1e24;
      transition: background 0.1s;
    }
    .file-item:hover {
      background: #151a20;
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .file-icon {
      font-size: 1.2rem;
    }
    .file-name {
      color: #eef4ff;
      font-weight: 500;
      word-break: break-all;
    }
    .file-size {
      color: #5a6a7a;
      font-size: 0.7rem;
      margin-left: 12px;
    }

    .download-btn {
      background: #1a2a2a;
      border: 1px solid #2a3a3a;
      color: #00ff9d;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.7rem;
      transition: 0.15s;
    }
    .download-btn:hover {
      background: #00ff9d;
      color: #0a0c10;
      border-color: #00ff9d;
    }

    .empty-folder {
      padding: 40px;
      text-align: center;
      color: #4a5a6a;
    }

    .footer {
      flex-shrink: 0;
      text-align: center;
      padding: 12px;
      font-size: 0.7rem;
      color: #2a3a3a;
      border-top: 1px solid #1e2228;
    }

    a {
      text-decoration: none;
    }

    /* скролл */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0e1115;
    }
    ::-webkit-scrollbar-thumb {
      background: #2a3a3a;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">XunKal1<span>/termux-repo</span></div>
  <div class="repo-line"><code>deb [trusted=yes] https://xunkal1-repo.vercel.app/repo termux extras</code></div>
  <a href="https://github.com/Hinderchik" target="_blank" class="github-link">
    <svg class="github-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <path fill="currentColor" d="M12.5.75C6.146.75 1 5.896 1 12.25c0 5.09 3.301 9.407 7.877 10.93.575.106.785-.25.785-.555 0-.274-.01-1.003-.015-1.97-3.204.696-3.88-1.544-3.88-1.544-.524-1.33-1.279-1.684-1.279-1.684-1.045-.714.079-.7.079-.7 1.156.081 1.764 1.186 1.764 1.186 1.027 1.76 2.694 1.251 3.351.957.104-.744.402-1.251.73-1.539-2.555-.29-5.241-1.277-5.241-5.686 0-1.256.449-2.283 1.185-3.088-.119-.29-.514-1.46.113-3.045 0 0 .966-.31 3.164 1.18.917-.255 1.902-.382 2.88-.387.978.005 1.963.132 2.88.387 2.198-1.49 3.163-1.18 3.163-1.18.628 1.585.233 2.755.114 3.045.737.805 1.185 1.832 1.185 3.088 0 4.418-2.69 5.393-5.254 5.678.413.356.78 1.057.78 2.13 0 1.538-.014 2.777-.014 3.155 0 .308.208.666.79.553 4.575-1.524 7.874-5.84 7.874-10.93 0-6.354-5.146-11.5-11.5-11.5z"/>
    </svg>
    GitHub
  </a>
</div>

<div class="file-manager">
  <div class="path-bar">
    📁 / <span>repo/dists/termux/extras/binary-all/</span>
  </div>
  <div class="files-list" id="files-list">
    <div class="empty-folder">⏳ загрузка пакетов...</div>
  </div>
</div>

<div class="footer">
  pkg install claude-cli
</div>

<script>
  const BASE_URL = 'https://xunkal1-repo.vercel.app';
  const PACKAGES_URL = '/repo/dists/termux/extras/binary-all/Packages';

  async function fetchPackages() {
    try {
      const response = await fetch(BASE_URL + PACKAGES_URL);
      if (!response.ok) throw new Error('Packages not found');
      const text = await response.text();

      const packages = [];
      let current = {};

      const lines = text.split('\n');
      for (const line of lines) {
        if (line.startsWith('Package: ')) {
          current.name = line.replace('Package: ', '');
        } else if (line.startsWith('Filename: ')) {
          current.file = line.replace('Filename: ', '');
        } else if (line.startsWith('Size: ')) {
          current.size = parseInt(line.replace('Size: ', ''), 10);
        } else if (line === '') {
          if (current.name && current.file) {
            packages.push({ ...current });
          }
          current = {};
        }
      }

      if (packages.length === 0) {
        document.getElementById('files-list').innerHTML = '<div class="empty-folder">📭 нет .deb пакетов</div>';
        return;
      }

      const filesList = document.getElementById('files-list');
      filesList.innerHTML = '';

      for (const pkg of packages) {
        const fileName = pkg.file.split('/').pop();
        const sizeKB = (pkg.size / 1024).toFixed(2);
        const fileUrl = BASE_URL + '/' + pkg.file;

        const div = document.createElement('div');
        div.className = 'file-item';

        div.innerHTML = `
          <div class="file-info">
            <div class="file-icon">📦</div>
            <div>
              <span class="file-name">${escapeHtml(fileName)}</span>
              <span class="file-size">${sizeKB} KB</span>
            </div>
          </div>
          <button class="download-btn" data-url="${escapeHtml(fileUrl)}" data-name="${escapeHtml(fileName)}">⬇ скачать</button>
        `;

        const btn = div.querySelector('.download-btn');
        btn.addEventListener('click', () => {
          const link = document.createElement('a');
          link.href = btn.getAttribute('data-url');
          link.download = btn.getAttribute('data-name');
          link.click();
        });

        filesList.appendChild(div);
      }
    } catch (err) {
      console.error(err);
      document.getElementById('files-list').innerHTML = '<div class="empty-folder">⚠️ не удалось загрузить список пакетов</div>';
    }
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  fetchPackages();
</script>
</body>
</html>
